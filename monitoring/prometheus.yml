# prometheus.yml — Configuration Prometheus
# Projet : IRIS-NICE-2024-RP01

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    site: 'IRIS-NICE'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'SRV-LINUX-IRIS'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'clamav'
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ['clamav:3310']
